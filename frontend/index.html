<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <!-- Vista de auth -->
    <div id="auth-section">
      <h1>Bookmark App</h1>
      <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="submit" id="auth-btn">Iniciar sesión</button>
        <p id="toggle-auth">¿No tenés cuenta? <span onclick="toggleAuth()">Registrate</span></p>
      </form>
    </div>

    <!-- Vista de bookmarks -->
    <div id="app-section" style="display:none">
      <div class="header">
        <h1>Mis Bookmarks</h1>
        <button id="logout-btn" onclick="logout()">Cerrar sesión</button>
      </div>

      <form id="bookmark-form">
        <input type="text" id="title" placeholder="Título" required>
        <input type="url" id="url" placeholder="URL (https://...)" required>
        <input type="text" id="tags" placeholder="Tags (separados por coma)">
        <button type="submit">Agregar</button>
      </form>

      <div id="bookmarks-list"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
